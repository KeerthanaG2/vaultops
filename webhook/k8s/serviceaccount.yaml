apiVersion: v1
kind: ServiceAccount
metadata:
  name: vaultops-webhook-sa
  namespace: vaultops
  annotations:
    # IRSA (IAM Roles for Service Accounts) annotation.
    # On EKS, the OIDC provider automatically exchanges the K8s service account
    # token for AWS credentials using this role ARN.
    # On Minikube, this annotation is ignored — instead, the EC2 role or
    # KIAM/Kube2IAM would provide credentials. During local dev with Minikube,
    # if webhook needs to assume this role, use:
    #   aws sts assume-role --role-arn <arn> --role-session-name <session-name>
    eks.amazonaws.com/role-arn: "arn:aws:iam::269531437067:role/vaultops-webhook-role"
